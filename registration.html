<!DOCTYPE html>

<html>
    <head>
       
        <title> form page</title>
        
    </head>
    <body>
        <br><hr>
        <div align="center">
            
                  <h2>Registration form</h2>
                  <form action="login.html"method="post">
                    <table collpading="10" border="0">
                <tr>
                    <td>
                        Name:<input type="text"  name="name" placeholder="Enter your name"required><br><br>

                    </td>
                </tr>
                <tr>
                    <td>
                        Email :<input type="email"  name="Email" placeholder="Enter your Email"required><br><br>

                    </td>
                </tr>
            
                <tr>
                    <td>
                         Date of Birth<input type="Date" placeholder="Enter your date of Birth"required><br><br>
                    </td>
                </tr>

                <tr>
                    <td>
                        Country Name:<select name="Country" id="Country">
                          <option value>select a Country</option>
                          <option value ="india">india</option>
                          <option value="china">china</option>
                          <option value="uk">uk</option>
                          <option value="canda">canda</option>
                          </select><br><br>
                    </td>
                </tr>

                <tr>
                    <td>
                        <Lable>Gender:</Lable>
                       <input type="radio"id="male" name="Gender" value="male">
                        <label for="Male">Male</label>

                        <input type="radio"id="female" name="Gender" value="female">
                        <label for="FeMale">Female</label>

                        <input type="radio"id="Other" name="Gender" value="Other">
                        <label for="Male">Other</label>
                    </td>
                </tr>

                <tr>
                    <td>
                
                        <label>Technical Skills:</label><br>

                        <input type="checkbox" id="html" name="tech" value="HTML">
                        <label for="html">HTML</label><br>

                        <input type="checkbox" id="css" name="tech" value="CSS">
                        <label for="css">CSS</label><br>

                        <input type="checkbox" id="js" name="tech" value="JavaScript">
                        <label for="js">JavaScript</label><br>

                        <input type="checkbox" id="python" name="tech" value="Python">
                        <label for="python">Python</label><br>
                        
                    </td>


                <tr>
                    <td>
                          Address:<textarea name="Address" placeholder="Enter you Address" required></textarea><br><br> 
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center">
                        <button type="Submit">Submit</button>
                    </td>
                </tr>
                
                </table>
                </form>
            

        </div>
    </body>
</html>
